<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LOG POSE ｜ 新人営業の航海</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2d1b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LOG POSE">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='%232d1b0e'/><text x='96' y='86' text-anchor='middle' font-family='serif' font-size='30' fill='%23d4a647'>%F0%9D%93%83 %F0%9D%82%80</text><text x='96' y='140' text-anchor='middle' font-family='serif' font-size='36' font-weight='700' fill='%23f5e9d3'>航</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴシック", sans-serif;
  background: linear-gradient(180deg, #2d1b0e 0%, #1a0f08 100%);
  color: #f5e9d3;
  min-height: 100vh;
  padding: 24px 16px 40px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 520px; margin: 0 auto; }
.header { text-align: center; padding: 12px 0 28px; }
.header .compass { font-size: 56px; line-height: 1; margin-bottom: 8px; }
.header h1 {
  font-size: 32px;
  letter-spacing: 8px;
  color: #d4a647;
  font-weight: 900;
  text-shadow: 0 2px 12px rgba(212, 166, 71, 0.3);
}
.header .sub { font-size: 13px; opacity: 0.7; margin-top: 6px; letter-spacing: 2px; }
.notice {
  background: rgba(212, 166, 71, 0.08);
  border-left: 3px solid #d4a647;
  padding: 14px 16px;
  font-size: 13px;
  margin-bottom: 20px;
  line-height: 1.7;
  border-radius: 0 8px 8px 0;
}
.notice b { color: #d4a647; }
.section {
  background: rgba(245, 233, 211, 0.04);
  border: 1px solid rgba(212, 166, 71, 0.18);
  border-radius: 14px;
  padding: 20px 18px;
  margin-bottom: 16px;
}
.section h2 {
  font-size: 17px;
  color: #d4a647;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212, 166, 71, 0.25);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
}
.title-list { list-style: none; }
.title-list li {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 11px 0;
  border-bottom: 1px dashed rgba(245, 233, 211, 0.08);
  font-size: 14px;
  gap: 12px;
}
.title-list li:last-child { border-bottom: none; }
.title-list .label { color: #d4a647; font-weight: 700; flex-shrink: 0; min-width: 110px; }
.title-list .desc { font-size: 11.5px; opacity: 0.6; text-align: right; line-height: 1.5; }
.title-list .hidden { color: #999; font-style: italic; }
.ranking-wrap { overflow-x: auto; }
.ranking-table { width: 100%; border-collapse: collapse; }
.ranking-table th, .ranking-table td {
  padding: 12px 6px;
  text-align: left;
  border-bottom: 1px solid rgba(245, 233, 211, 0.08);
  font-size: 12.5px;
  white-space: nowrap;
}
.ranking-table th {
  color: #d4a647;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.7;
}
.ranking-table td.rank { font-weight: 900; font-size: 16px; width: 30px; }
.ranking-table tr:nth-child(1) td.rank { color: #d4a647; }
.ranking-table tr:nth-child(2) td.rank { color: #c0c0c0; }
.ranking-table tr:nth-child(3) td.rank { color: #cd7f32; }
.ranking-table .nickname { font-weight: 700; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
.ranking-table .title-cell { font-size: 11px; opacity: 0.8; }
.loading { text-align: center; padding: 24px 0; opacity: 0.5; font-size: 13px; }
.refresh-btn {
  display: block;
  margin: 12px auto 0;
  padding: 8px 20px;
  background: rgba(212, 166, 71, 0.15);
  border: 1px solid rgba(212, 166, 71, 0.4);
  color: #d4a647;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:active { background: rgba(212, 166, 71, 0.25); }
.footer {
  text-align: center;
  font-size: 10.5px;
  opacity: 0.4;
  margin-top: 28px;
  line-height: 1.6;
}
.error { color: #e85d5d; padding: 16px; background: rgba(232, 93, 93, 0.08); border-radius: 8px; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="compass">🧭</div>
    <h1>LOG POSE</h1>
    <div class="sub">新 人 営 業 の 航 海</div>
  </div>

  <div class="notice">
    📍 個人の XP / 称号は LINE で「<b>XP</b>」と送って確認<br>
    📍 ランキング表示名は「<b>あだ名 〇〇</b>」で変更
  </div>

  <div class="section">
    <h2>📜 称号体系（9段階）</h2>
    <ul class="title-list" id="titles"></ul>
  </div>

  <div class="section">
    <h2>🏴‍☠️ 今月の海賊番付</h2>
    <div id="ranking-container">
      <div class="loading">航海日誌を読み込み中…</div>
    </div>
    <button class="refresh-btn" onclick="fetchRanking()">🔄 更新</button>
  </div>

  <div class="footer">
    LOG POSE v1 ｜ Phase 1 (2026/05)<br>
    © 株式会社レジェンドリーム
  </div>
</div>

<script>
const TITLES = [
  { min: 0,   label: 'タル',           desc: '入社＆研修中・まだ現場前' },
  { min: 5,   label: 'イーストブルー', desc: '個人月収20万・1名教育' },
  { min: 15,  label: 'レッドライン',   desc: '個人月収50万・4名教育' },
  { min: 30,  label: 'グランドライン', desc: 'チーム月収100万・8名教育' },
  { min: 60,  label: '新世界',         desc: 'チーム月収200万・12名教育' },
  { min: 100, label: '七武海',         desc: 'チーム月収300万・20名教育' },
  { min: 180, label: '最悪の世代',     desc: 'チーム月収500万・40名教育' },
  { min: 350, label: '四皇',           desc: 'チーム月収1,000万・最終' },
  { min: -1,  label: '???',            desc: '隠れミッション・四皇の先', hidden: true }
];

const API_BASE = 'https://script.google.com/macros/s/AKfycbwnnnJtbZ2BVr_FLN_D8zOPbLi2su1WoNCikWNuJPT8I7cpEvI3eSZbfDbM6yY8Db8awA/exec';

function renderTitles() {
  document.getElementById('titles').innerHTML = TITLES.map(t => `
    <li>
      <span class="label ${t.hidden ? 'hidden' : ''}">${t.label}</span>
      <span class="desc">${t.desc}</span>
    </li>
  `).join('');
}

async function fetchRanking() {
  const container = document.getElementById('ranking-container');
  container.innerHTML = `<div class="loading">航海日誌を読み込み中…</div>`;
  try {
    const res = await fetch(`${API_BASE}?path=ranking`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '取得失敗');
    renderRanking(data.ranking || []);
  } catch (e) {
    container.innerHTML = `<div class="error">⚠️ ${e.message}<br><small>しばらく待って「更新」ボタンを押してください</small></div>`;
  }
}

function renderRanking(ranking) {
  const container = document.getElementById('ranking-container');
  if (!ranking || ranking.length === 0) {
    container.innerHTML = `<div class="loading">まだランキングがありません</div>`;
    return;
  }
  const rows = ranking.map(r => `
    <tr>
      <td class="rank">${r.rank}</td>
      <td class="nickname">${r.nickname}</td>
      <td class="title-cell">${r.title}</td>
      <td>${r.apoTotal}</td>
      <td>${(r.xpMonthly || 0).toLocaleString()}</td>
    </tr>
  `).join('');
  container.innerHTML = `
    <div class="ranking-wrap">
      <table class="ranking-table">
        <thead>
          <tr><th>順</th><th>あだ名</th><th>称号</th><th>A</th><th>XP</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

renderTitles();
fetchRanking();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
  });
}
</script>
</body>
</html>
