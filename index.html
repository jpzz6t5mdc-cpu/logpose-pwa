<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LOG POSE ｜ 新人営業の航海</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2d1b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LOG POSE">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='%232d1b0e'/><text x='96' y='86' text-anchor='middle' font-family='serif' font-size='30' fill='%23d4a647'>%F0%9D%93%83 %F0%9D%82%80</text><text x='96' y='140' text-anchor='middle' font-family='serif' font-size='36' font-weight='700' fill='%23f5e9d3'>航</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴシック", sans-serif;
  background: linear-gradient(180deg, #2d1b0e 0%, #1a0f08 100%);
  color: #f5e9d3;
  min-height: 100vh;
  padding: 24px 16px 40px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 520px; margin: 0 auto; }
.header { text-align: center; padding: 12px 0 28px; }
.header .compass { font-size: 56px; line-height: 1; margin-bottom: 8px; }
.header h1 {
  font-size: 32px;
  letter-spacing: 8px;
  color: #d4a647;
  font-weight: 900;
  text-shadow: 0 2px 12px rgba(212, 166, 71, 0.3);
}
.header .sub { font-size: 13px; opacity: 0.7; margin-top: 6px; letter-spacing: 2px; }
.notice {
  background: rgba(212, 166, 71, 0.08);
  border-left: 3px solid #d4a647;
  padding: 14px 16px;
  font-size: 13px;
  margin-bottom: 20px;
  line-height: 1.7;
  border-radius: 0 8px 8px 0;
}
.notice b { color: #d4a647; }
.section {
  background: rgba(245, 233, 211, 0.04);
  border: 1px solid rgba(212, 166, 71, 0.18);
  border-radius: 14px;
  padding: 20px 18px;
  margin-bottom: 16px;
}
.section h2 {
  font-size: 17px;
  color: #d4a647;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212, 166, 71, 0.25);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
}
.title-list { list-style: none; }
.title-list li {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 11px 0;
  border-bottom: 1px dashed rgba(245, 233, 211, 0.08);
  font-size: 14px;
  gap: 12px;
}
.title-list li:last-child { border-bottom: none; }
.title-list .label { color: #d4a647; font-weight: 700; flex-shrink: 0; min-width: 110px; }
.title-list .desc { font-size: 11.5px; opacity: 0.6; text-align: right; line-height: 1.5; }
.title-list .hidden { color: #999; font-style: italic; }
.ranking-wrap { overflow-x: auto; }
.ranking-table { width: 100%; border-collapse: collapse; }
.ranking-table th, .ranking-table td {
  padding: 12px 6px;
  text-align: left;
  border-bottom: 1px solid rgba(245, 233, 211, 0.08);
  font-size: 12.5px;
  white-space: nowrap;
}
.ranking-table th {
  color: #d4a647;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.7;
}
.ranking-table td.rank { font-weight: 900; font-size: 16px; width: 30px; }
.ranking-table tr:nth-child(1) td.rank { color: #d4a647; }
.ranking-table tr:nth-child(2) td.rank { color: #c0c0c0; }
.ranking-table tr:nth-child(3) td.rank { color: #cd7f32; }
.ranking-table .nickname { font-weight: 700; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
.ranking-table .title-cell { font-size: 11px; opacity: 0.8; }
.loading { text-align: center; padding: 24px 0; opacity: 0.5; font-size: 13px; }
.refresh-btn {
  display: block;
  margin: 12px auto 0;
  padding: 8px 20px;
  background: rgba(212, 166, 71, 0.15);
  border: 1px solid rgba(212, 166, 71, 0.4);
  color: #d4a647;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:active { background: rgba(212, 166, 71, 0.25); }
.footer {
  text-align: center;
  font-size: 10.5px;
  opacity: 0.4;
  margin-top: 28px;
  line-height: 1.6;
}
.error { color: #e85d5d; padding: 16px; background: rgba(232, 93, 93, 0.08); border-radius: 8px; font-size: 12px; }
/* Phase 1.5a: あだ名バー + 称号 modal + 自分ハイライト */
.my-nickname-bar { background: rgba(212, 166, 71, 0.08); border: 1px solid rgba(212, 166, 71, 0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; gap: 8px; }
.my-nickname-bar .label { opacity: 0.7; flex-shrink: 0; }
.my-nickname-bar .value { color: #d4a647; font-weight: 700; flex: 1; text-align: right; overflow: hidden; text-overflow: ellipsis; }
.my-nickname-bar .change-btn { background: rgba(212, 166, 71, 0.15); border: 1px solid rgba(212, 166, 71, 0.4); color: #d4a647; padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.my-nickname-bar .change-btn:active { background: rgba(212, 166, 71, 0.3); }
.title-list li { cursor: pointer; transition: background 0.15s; padding: 11px 8px; margin: 0 -8px; border-radius: 6px; }
.title-list li:active { background: rgba(212, 166, 71, 0.1); }
.title-list li[data-hidden="1"] { cursor: default; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.75); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; -webkit-tap-highlight-color: transparent; }
.modal-overlay.show { display: flex; }
.modal-content { background: linear-gradient(180deg, #2d1b0e 0%, #1a0f08 100%); border: 1px solid #d4a647; border-radius: 14px; padding: 28px 22px; max-width: 360px; width: 100%; position: relative; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); }
.modal-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: #d4a647; font-size: 28px; cursor: pointer; line-height: 1; padding: 4px 10px; }
.modal-content h3 { color: #d4a647; margin-bottom: 14px; font-size: 22px; letter-spacing: 2px; }
.modal-content p { line-height: 1.7; font-size: 14px; }
.modal-detail { margin-top: 16px; padding-top: 14px; border-top: 1px dashed rgba(212, 166, 71, 0.3); opacity: 0.85; font-size: 12.5px; line-height: 1.8; }
.modal-detail b { color: #d4a647; }
.ranking-table tr.self td { background: rgba(212, 166, 71, 0.12); }
.ranking-table .nickname.self { color: #d4a647; font-weight: 900; }
/* Phase 1.5a Step 3-6: 合計カウンタ / 入力状況 / 月切替 / 推移グラフ */
.totals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.total-cell { background: rgba(212, 166, 71, 0.06); border: 1px solid rgba(212, 166, 71, 0.18); border-radius: 8px; padding: 12px 4px; text-align: center; }
.total-cell .label { font-size: 10px; opacity: 0.6; letter-spacing: 1px; margin-bottom: 4px; }
.total-cell .value { font-size: 22px; color: #d4a647; font-weight: 900; line-height: 1; }
.total-cell.xp .value { font-size: 16px; }
.totals-meta { margin-top: 10px; font-size: 10.5px; opacity: 0.5; text-align: center; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.input-grid h4 { font-size: 13px; color: #d4a647; margin-bottom: 8px; opacity: 0.85; }
.input-grid ul { list-style: none; padding-left: 0; }
.input-grid li { padding: 6px 8px; font-size: 12.5px; background: rgba(245, 233, 211, 0.04); border-radius: 4px; margin-bottom: 4px; }
.input-grid li.pending { opacity: 0.6; }
.input-grid li.empty { opacity: 0.4; font-style: italic; }
.input-date { margin-top: 10px; font-size: 10.5px; opacity: 0.5; text-align: center; }
.month-switcher { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 14px; }
.month-switcher button { background: rgba(212, 166, 71, 0.12); border: 1px solid rgba(212, 166, 71, 0.4); color: #d4a647; width: 38px; height: 30px; border-radius: 6px; font-size: 16px; cursor: pointer; }
.month-switcher button:active { background: rgba(212, 166, 71, 0.25); }
.month-switcher button:disabled { opacity: 0.3; cursor: not-allowed; }
.month-switcher .current { font-size: 14px; color: #d4a647; font-weight: 700; letter-spacing: 1px; min-width: 80px; text-align: center; }
.chart-wrap { padding: 8px 4px 0; }
.chart-wrap svg { width: 100%; height: auto; }
.chart-note { margin-top: 8px; font-size: 10.5px; opacity: 0.5; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="compass">🧭</div>
    <h1>LOG POSE</h1>
    <div class="sub">新 人 営 業 の 航 海</div>
  </div>

  <div class="my-nickname-bar">
    <span class="label">⚓ あなたのあだ名：</span>
    <span class="value" id="my-nickname-value">未設定</span>
    <button class="change-btn" onclick="changeMyNickname()">変更</button>
  </div>

  <div class="notice">
    📍 個人の XP / 称号は LINE で「<b>XP</b>」と送って確認<br>
    📍 ランキング表示名は「<b>あだ名 〇〇</b>」で変更
  </div>

  <div class="section">
    <h2>⚓ 今月の海賊団航海状況</h2>
    <div id="company-totals">
      <div class="loading">…</div>
    </div>
  </div>

  <div class="section">
    <h2>📋 今日の航海日誌</h2>
    <div id="input-status">
      <div class="loading">読み込み中…</div>
    </div>
  </div>

  <div class="section">
    <h2>📜 称号体系（9段階）</h2>
    <ul class="title-list" id="titles"></ul>
  </div>

  <div class="section">
    <h2>🏴‍☠️ 海賊番付</h2>
    <div class="month-switcher">
      <button id="prev-month" onclick="changeMonth(-1)">＜</button>
      <span class="current" id="current-month">―</span>
      <button id="next-month" onclick="changeMonth(1)">＞</button>
    </div>
    <div id="ranking-container">
      <div class="loading">航海日誌を読み込み中…</div>
    </div>
    <button class="refresh-btn" onclick="fetchAll()">🔄 全体更新</button>
  </div>

  <div class="section">
    <h2>📈 全体推移（直近6ヶ月）</h2>
    <div id="trend-chart">
      <div class="loading">…</div>
    </div>
  </div>

  <div class="footer">
    LOG POSE v1 ｜ Phase 1.5a (2026/05)<br>
    © 株式会社レジェンドリーム
  </div>
</div>

<div id="title-modal" class="modal-overlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()" aria-label="閉じる">×</button>
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="modal-detail" id="modal-detail"></div>
  </div>
</div>

<script>
const TITLES = [
  { min: 0,   label: 'タル',           desc: '入社＆研修中・まだ現場前' },
  { min: 5,   label: 'イーストブルー', desc: '個人月収20万・1名教育' },
  { min: 15,  label: 'レッドライン',   desc: '個人月収50万・4名教育' },
  { min: 30,  label: 'グランドライン', desc: 'チーム月収100万・8名教育' },
  { min: 60,  label: '新世界',         desc: 'チーム月収200万・12名教育' },
  { min: 100, label: '七武海',         desc: 'チーム月収300万・20名教育' },
  { min: 180, label: '最悪の世代',     desc: 'チーム月収500万・40名教育' },
  { min: 350, label: '四皇',           desc: 'チーム月収1,000万・最終' },
  { min: -1,  label: '???',            desc: '隠れミッション・四皇の先', hidden: true }
];

const API_BASE = 'https://script.google.com/macros/s/AKfycbwnnnJtbZ2BVr_FLN_D8zOPbLi2su1WoNCikWNuJPT8I7cpEvI3eSZbfDbM6yY8Db8awA/exec';

function renderTitles() {
  document.getElementById('titles').innerHTML = TITLES.map((t, i) => `
    <li onclick="openModal(${i})" data-hidden="${t.hidden ? '1' : ''}">
      <span class="label ${t.hidden ? 'hidden' : ''}">${t.label}</span>
      <span class="desc">${t.desc}</span>
    </li>
  `).join('');
}

function openModal(idx) {
  const t = TITLES[idx];
  if (t.hidden) return;  // ??? は非タップ（神秘性維持）
  document.getElementById('modal-title').textContent = t.label;
  document.getElementById('modal-desc').textContent = t.desc;
  const worldview = t.label === 'タル' ? '入社直後・港を出る前'
    : t.label === '四皇' ? '七つの海の覇者・最終称号'
    : '航海の途中・次の港を目指す';
  document.getElementById('modal-detail').innerHTML =
    `必要アポ：<b>${t.min}件</b> 以上<br>世界観：${worldview}`;
  document.getElementById('title-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('title-modal').classList.remove('show');
}

function getMyNickname() {
  return localStorage.getItem('logpose_nickname') || '';
}

function renderMyNicknameBar() {
  const my = getMyNickname();
  document.getElementById('my-nickname-value').textContent = my || '未設定';
}

function changeMyNickname() {
  const current = getMyNickname();
  const n = (prompt('あなたのあだ名を入力（LINE で「あだ名 〇〇」と同じ値推奨）', current) || '').trim();
  if (n) {
    localStorage.setItem('logpose_nickname', n);
    renderMyNicknameBar();
    fetchRanking();  // ハイライト即時反映
  }
}

// Phase 1.5a: 現在閲覧中の月（当月初期値）
let currentMonth = new Date();
function monthKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}
function isCurrentMonth() {
  const now = new Date();
  return currentMonth.getFullYear() === now.getFullYear() && currentMonth.getMonth() === now.getMonth();
}
function renderMonthSwitcher() {
  document.getElementById('current-month').textContent = monthKey(currentMonth);
  document.getElementById('next-month').disabled = isCurrentMonth();
}
function changeMonth(delta) {
  const next = new Date(currentMonth);
  next.setMonth(next.getMonth() + delta);
  if (delta > 0 && next > new Date()) return;  // 未来月は禁止
  currentMonth = next;
  renderMonthSwitcher();
  fetchRanking();
  fetchCompanyTotals();
}

async function fetchRanking() {
  const container = document.getElementById('ranking-container');
  container.innerHTML = `<div class="loading">航海日誌を読み込み中…</div>`;
  try {
    const url = `${API_BASE}?path=ranking&month=${monthKey(currentMonth)}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '取得失敗');
    renderRanking(data.ranking || []);
  } catch (e) {
    container.innerHTML = `<div class="error">⚠️ ${e.message}<br><small>しばらく待って「更新」ボタンを押してください</small></div>`;
  }
}

async function fetchCompanyTotals() {
  const container = document.getElementById('company-totals');
  try {
    const url = `${API_BASE}?path=company_totals&month=${monthKey(currentMonth)}`;
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '取得失敗');
    const t = data.totals;
    container.innerHTML = `
      <div class="totals-grid">
        <div class="total-cell"><div class="label">P</div><div class="value">${t.p}</div></div>
        <div class="total-cell"><div class="label">A</div><div class="value">${t.a}</div></div>
        <div class="total-cell"><div class="label">K</div><div class="value">${t.k}</div></div>
        <div class="total-cell xp"><div class="label">XP</div><div class="value">${t.xp.toLocaleString()}</div></div>
      </div>
      <div class="totals-meta">${data.month}・記録 ${t.records} 件</div>
    `;
  } catch (e) {
    container.innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
  }
}

async function fetchInputStatus() {
  const container = document.getElementById('input-status');
  try {
    const res = await fetch(`${API_BASE}?path=today_input_status`, { cache: 'no-store' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '取得失敗');
    const s = data.status;
    const renderList = (arr, cls) => arr.length
      ? arr.map(n => `<li class="${cls}">${n}</li>`).join('')
      : `<li class="empty">${cls === 'pending' ? '全員入力済' : 'なし'}</li>`;
    container.innerHTML = `
      <div class="input-grid">
        <div><h4>✅ 入力済 (${s.input.length})</h4><ul>${renderList(s.input, '')}</ul></div>
        <div><h4>⏳ 未入力 (${s.pending.length})</h4><ul>${renderList(s.pending, 'pending')}</ul></div>
      </div>
      <div class="input-date">本日：${s.today}</div>
    `;
  } catch (e) {
    container.innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
  }
}

async function fetchTrend() {
  const container = document.getElementById('trend-chart');
  try {
    const res = await fetch(`${API_BASE}?path=monthly_trend&months=6`, { cache: 'no-store' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '取得失敗');
    renderTrendChart(data.trend || []);
  } catch (e) {
    container.innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
  }
}

function renderTrendChart(trend) {
  if (!trend || trend.length === 0) {
    document.getElementById('trend-chart').innerHTML = `<div class="loading">データなし</div>`;
    return;
  }
  const max = Math.max(...trend.map(t => t.a), 1);
  const W = 300, H = 160, padY = 30;
  const barWidth = (W / trend.length) * 0.6;
  const bars = trend.map((t, i) => {
    const bh = (t.a / max) * (H - padY * 2);
    const x = (W / trend.length) * i + (W / trend.length - barWidth) / 2;
    const y = H - padY - bh;
    const isCurrent = t.month === monthKey(new Date());
    return `
      <rect x="${x}" y="${y}" width="${barWidth}" height="${bh}" fill="${isCurrent ? '#d4a647' : 'rgba(212,166,71,0.5)'}" rx="2"/>
      <text x="${x + barWidth/2}" y="${H - 12}" text-anchor="middle" font-size="9" fill="#f5e9d3" opacity="0.6">${t.month.slice(-2)}月</text>
      <text x="${x + barWidth/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="#d4a647" font-weight="700">${t.a}</text>
    `;
  }).join('');
  document.getElementById('trend-chart').innerHTML = `
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="月別アポ件数推移">
        ${bars}
      </svg>
      <div class="chart-note">アポ件数（A）の月別推移・最大値 ${max} 件</div>
    </div>
  `;
}

function fetchAll() {
  fetchRanking();
  fetchCompanyTotals();
  fetchInputStatus();
  fetchTrend();
}

function renderRanking(ranking) {
  const container = document.getElementById('ranking-container');
  if (!ranking || ranking.length === 0) {
    container.innerHTML = `<div class="loading">まだランキングがありません</div>`;
    return;
  }
  const my = getMyNickname();
  const rows = ranking.map(r => {
    const isMe = my && r.nickname === my;
    return `
    <tr class="${isMe ? 'self' : ''}">
      <td class="rank">${r.rank}</td>
      <td class="nickname ${isMe ? 'self' : ''}">${r.nickname}${isMe ? ' ⚓' : ''}</td>
      <td class="title-cell">${r.title}</td>
      <td>${r.apoTotal}</td>
      <td>${(r.xpMonthly || 0).toLocaleString()}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `
    <div class="ranking-wrap">
      <table class="ranking-table">
        <thead>
          <tr><th>順</th><th>あだ名</th><th>称号</th><th>A</th><th>XP</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

renderTitles();
renderMyNicknameBar();
renderMonthSwitcher();
fetchAll();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
  });
}
</script>
</body>
</html>
